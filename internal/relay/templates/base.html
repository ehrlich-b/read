{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{template "title" .}}</title>
<style>
:root {
  --text: #e0e0e0;
  --text-dim: #888;
  --bg: #1a1a1a;
  --bg-card: #242424;
  --action: #4a9eff;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  max-width: 960px;
  margin: 0 auto;
  padding: 16px;
}
a { color: var(--action); text-decoration: none; }
a:hover { text-decoration: underline; }
.site-nav {
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 13px;
  font-family: var(--mono);
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.site-nav .brand {
  color: var(--text);
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
}
.site-nav .brand:hover { color: var(--action); text-decoration: none; }
.site-nav .tagline { color: var(--text-dim); font-size: 12px; }
</style>
{{template "head" .}}
</head>
<body>
<nav class="site-nav">
  <a href="/" class="brand">read.ehrlich.dev</a>
  <span class="tagline">ai-curated rss</span>
  <a href="/about" style="margin-left:auto;color:var(--text-dim);font-size:12px">about</a>
</nav>
{{template "content" .}}
</body>
</html>{{end}}
